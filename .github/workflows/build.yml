name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant gradlew execute permission
        run: chmod +x ./gradlew

      # The project's gradle.properties pins org.gradle.java.home to a path
      # that exists on the maintainer's local machine but NOT on CI runners.
      # We override it via -D so Gradle uses setup-java's JAVA_HOME instead.
      - name: Build
        run: ./gradlew build --no-daemon -Dorg.gradle.java.home=$JAVA_HOME

      - name: Upload NeoForge artifact
        uses: actions/upload-artifact@v4
        with:
          name: trienergy-neoforge
          path: neoforge/build/libs/*.jar
          if-no-files-found: error

      - name: Upload Fabric artifact
        uses: actions/upload-artifact@v4
        with:
          name: trienergy-fabric
          path: fabric/build/libs/*.jar
          if-no-files-found: error
